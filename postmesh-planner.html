<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PostMesh Planner</title>
<style>
/* ── Reset & base ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f1;font-family:Georgia,serif;min-height:100vh;display:flex;flex-direction:column;color:#252320}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:system-ui,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d0cac2;border-radius:3px}

/* ── Calendar grid ── 最重要: minmax(0,1fr) で均等幅を強制 ── */
.cal-grid-week{
  display:grid;
  grid-template-columns:repeat(7, minmax(0,1fr)); /* ← ここがポイント */
  gap:4px;
  margin-bottom:4px;
}
.day-cell{
  min-height:110px;
  max-height:160px;
  overflow:hidden;          /* ← コンテンツがはみ出ても広がらない */
  min-width:0;              /* ← グリッドアイテムの収縮を許可 */
  background:#fff;
  border:1px solid #e6e2db;
  border-radius:10px;
  padding:6px 7px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  transition:border-color .15s;
  position:relative;
}
.day-cell:hover{border-color:#c8c3bb}
.day-cell.today-cell{border:1.5px solid #3d6b9e}
.day-cell.selected-cell{background:#ebf2f9;border:1.5px solid #3d6b9e}
.day-cell.empty-cell{background:transparent;border-color:transparent;cursor:default;min-height:110px}

/* チップ: 横幅いっぱいに広げてテキストを切る */
.post-chip{
  display:flex;
  align-items:center;
  gap:3px;
  padding:2px 5px;
  border-radius:4px;
  margin-bottom:2px;
  cursor:pointer;
  min-width:0;              /* ← flex子要素も収縮許可 */
  overflow:hidden;
  flex-shrink:0;
  transition:opacity .1s;
}
.post-chip:hover{opacity:.75}
.chip-icon{font-size:8px;flex-shrink:0}
.chip-text{
  font-size:8px;
  font-family:system-ui,sans-serif;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
  min-width:0;
}
.day-num{font-family:system-ui,sans-serif;font-size:11px;font-weight:500;flex-shrink:0}

/* ── Side panel slide ── */
.panel-wrap{
  transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s;
  overflow:hidden;
  flex-shrink:0;
  border-left:1px solid #e6e2db;
}
/* ── List row ── */
.list-row{transition:box-shadow .15s}
.list-row:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
/* ── Acct radio ── */
.acct-radio{cursor:pointer;transition:border-color .12s,background .12s}
.acct-radio:hover{border-color:#3d6b9e!important}
/* ── Copy button ── */
.copy-btn{transition:all .18s}
.copy-btn:hover{border-color:#3d6b9e!important;color:#3d6b9e!important;background:#ebf2f9!important}
/* ── Modal ── */
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-in{animation:fi .2s ease}
/* ── Status buttons ── */
.st-btn{transition:all .12s}
/* ── View toggle btn ── */
.view-btn{transition:all .15s}
input:focus,textarea:focus,select:focus{outline:2px solid #3d6b9e;outline-offset:0}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;min-height:100vh"></div>

/* ═══════════════════════════════════════════
   UTILS

const pad=n=>String(n).padStart(2,'0');
const uid=()=>Math.random().toString(36).slice(2,10);
const dkey=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const TODAY=new Date();
const TKEY=dkey(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
const acct=id=>ACCTS.find(x=>x.id===id);

function toPostMesh(p){
  const a=acct(p.accountId);
  return{category:'text',caption:p.text,targets:[{connection_id:a?a.cid:'conn_unknown'}],scheduled_at:`${p.date}T${p.time||'12:00'}:00+09:00`};
}

async function copyText(text,btn){
  try{await navigator.clipboard.writeText(text);}
  catch{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  if(!btn)return;
  const orig=btn.innerHTML,os=btn.getAttribute('data-orig-style')||btn.style.cssText;
  btn.innerHTML='✔ コピー済み';
  btn.style.borderColor='#86efac';btn.style.color='#15803d';btn.style.background='#f0fdf4';
  setTimeout(()=>{btn.innerHTML=orig;btn.style.borderColor='';btn.style.color='';btn.style.background='';},2200);
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const LS='postmesh_v2';
function loadP(){try{const r=localStorage.getItem(LS);return r?JSON.parse(r):[...DUMMY];}catch{return[...DUMMY];}}
function saveP(){try{localStorage.setItem(LS,JSON.stringify(S.posts));}catch{}}

const S={
  y:2026,m:3,
  posts:loadP(),
  view:'calendar',
  panelOpen:false,selectedDay:null,editId:null,
  exportOpen:false,exportMode:'month',exportSel:new Set(),
  lsf:'all',laf:'all',
};
const F={aid:'x_main',date:'2026-04-19',time:'19:00',text:'',media:'',status:'Draft'};

/* ═══════════════════════════════════════════
   BADGE HELPERS
═══════════════════════════════════════════ */
function sBadge(st,sm){
  const s=SC[st];if(!s)return'';
  return`<span style="display:inline-flex;align-items:center;gap:4px;background:${s.ch};color:${s.tx};border:1px solid ${s.bo};border-radius:20px;font-weight:700;font-family:system-ui;font-size:${sm?9:11}px;padding:${sm?'2px 7px':'3px 9px'}"><span style="width:${sm?5:6}px;height:${sm?5:6}px;border-radius:50%;background:${s.dt};display:inline-block;flex-shrink:0"></span>${sm?s.ja:`${s.ja} (${st})`}</span>`;
}
function aBadge(id,sm){
  const a=acct(id);if(!a)return'';
  return`<span style="display:inline-flex;align-items:center;gap:4px;background:${a.lt};color:${a.col};border-radius:5px;font-weight:700;font-family:system-ui;font-size:${sm?9:11}px;padding:${sm?'2px 6px':'3px 9px'}"><span style="font-size:${sm?9:10}px">${PI[a.pl]}</span>${esc(a.lbl)}</span>`;
}

/* ═══════════════════════════════════════════
   RENDER: HEADER
═══════════════════════════════════════════ */
function rHeader(){
  const pfx=`${S.y}-${pad(S.m+1)}`;
  const mp=S.posts.filter(p=>p.date.startsWith(pfx));
  const cnt={Draft:0,Scheduled:0,Posted:0};
  mp.forEach(p=>{if(cnt[p.status]!==undefined)cnt[p.status]++;});
  const cH=Object.entries(cnt).map(([k,c])=>`<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:${SC[k].dt};line-height:1;font-family:system-ui">${c}</div><div style="font-size:9px;color:#aeaaa4;font-family:system-ui">${SC[k].ja}</div></div>`).join('');
  const vS=v=>`display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:none;font-size:12px;font-family:system-ui;background:${S.view===v?'#fff':'transparent'};color:${S.view===v?'#3d6b9e':'#6e6a65'};font-weight:${S.view===v?700:500};box-shadow:${S.view===v?'0 1px 4px rgba(0,0,0,.09)':'none'}`;
  return`
<header style="background:#fff;border-bottom:1px solid #e6e2db;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:40">
  <div style="display:flex;align-items:center;gap:14px">
    <div>
      <p style="margin:0;font-size:9px;color:#aeaaa4;font-family:system-ui;letter-spacing:.2em;text-transform:uppercase;line-height:1">PostMesh Planner</p>
      <h1 style="margin:0;font-size:19px;font-weight:700;color:#252320;letter-spacing:-.5px">${MEN[S.m]} <span style="color:#3d6b9e">${S.y}</span></h1>
    </div>
    <div style="display:flex;gap:3px">
      <button id="btn-prev" style="width:30px;height:30px;background:#f2eeea;border:none;border-radius:7px;color:#6e6a65;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center">‹</button>
      <button id="btn-next" style="width:30px;height:30px;background:#f2eeea;border:none;border-radius:7px;color:#6e6a65;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center">›</button>
    </div>
    <div style="display:flex;background:#f0ede8;border-radius:9px;padding:3px;gap:2px">
      <button class="view-btn" id="vt-cal"  style="${vS('calendar')}">📅 カレンダー</button>
      <button class="view-btn" id="vt-list" style="${vS('list')}">📋 リスト</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div style="display:flex;gap:10px">${cH}</div>
    <div style="width:1px;height:24px;background:#e6e2db"></div>
    <button id="btn-export" style="display:flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid #fcd34d;border-radius:8px;background:#fffbeb;color:#92400e;font-size:11px;font-weight:700;font-family:system-ui">⚡ PostMesh エクスポート</button>
    <button id="btn-new" style="display:flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:8px;background:#3d6b9e;color:#fff;font-size:11px;font-weight:700;font-family:system-ui">＋ 新規投稿</button>
  </div>
</header>`;
}

/* ═══════════════════════════════════════════
   RENDER: CALENDAR  ←  均等グリッド修正版
═══════════════════════════════════════════ */
function rCalendar(){
  /* 日付→投稿マップ */
  const pbd={};
  S.posts.forEach(p=>{if(!pbd[p.date])pbd[p.date]=[];pbd[p.date].push(p);});

  /* カレンダー日付配列 */
  const first=new Date(S.y,S.m,1).getDay();
  const dim=new Date(S.y,S.m+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let i=1;i<=dim;i++)cells.push(i);
  while(cells.length%7!==0)cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  /* 曜日ヘッダー */
  const wdH=WD.map((d,i)=>`<div style="grid-column:span 1;text-align:center;font-size:10px;font-weight:700;font-family:system-ui;color:${i===0?'#c04a4a':i===6?'#3d6b9e':'#aeaaa4'};padding:4px 0;letter-spacing:.06em">${d}</div>`).join('');

  /* 週行 */
  const weeksH=weeks.map(week=>`
<div class="cal-grid-week">
${week.map((day,di)=>{
  if(!day)return`<div class="day-cell empty-cell"></div>`;
  const dk=dkey(S.y,S.m,day);
  const dp=pbd[dk]||[];
  const isT=dk===TKEY,isSel=S.panelOpen&&S.selectedDay===day;
  const isSun=di===0,isSat=di===6;
  /* 日付番号スタイル */
  const nS=isT
    ?`display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#3d6b9e;color:#fff;border-radius:50%;font-size:10px;font-weight:700`
    :`color:${isSun?'#c04a4a':isSat?'#3d6b9e':'#5a5855'};font-size:11px;font-weight:500`;
  /* 投稿チップ（最大3件） */
  const chips=dp.slice(0,3).map(p=>{
    const s=SC[p.status],a=acct(p.accountId);
    return`<div class="post-chip" data-pid="${p.id}" style="background:${s.ch};border:1px solid ${s.bo}">
      <span class="chip-icon" style="color:${a?.col||'#888'}">${PI[a?.pl||'x']||'•'}</span>
      <span class="chip-text" style="color:${s.tx}">${p.time||''} ${esc(p.text)}</span>
    </div>`;
  }).join('');
  const more=dp.length>3?`<span style="font-size:8px;color:#3d6b9e;font-family:system-ui;font-weight:600;padding-left:2px;flex-shrink:0">+${dp.length-3}</span>`:'';

  return`<div class="day-cell${isT?' today-cell':''}${isSel?' selected-cell':''}" data-day="${day}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;flex-shrink:0">
      <span class="day-num" style="${nS};font-family:system-ui;line-height:1">${day}</span>
      ${dp.length?`<span style="font-size:8px;color:#aeaaa4;font-family:system-ui;flex-shrink:0">${dp.length}</span>`:''}
    </div>
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0">
      ${chips}${more}
    </div>
  </div>`;
}).join('')}
</div>`).join('');

  /* 凡例 */
  const lgnd=Object.entries(SC).map(([k,s])=>`
<div style="display:flex;align-items:center;gap:5px">
  <div style="width:8px;height:8px;border-radius:2px;background:${s.ch};border:1.5px solid ${s.bo}"></div>
  <span style="font-size:10px;color:#6e6a65;font-family:system-ui">${s.ja}</span>
</div>`).join('');

  return`
<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <div style="flex:1;padding:12px 16px;overflow-y:auto">
    <div class="cal-grid-week" style="margin-bottom:4px">${wdH}</div>
    ${weeksH}
  </div>
  <div style="border-top:1px solid #e6e2db;background:#fff;padding:8px 18px;display:flex;align-items:center;gap:18px;flex-shrink:0">
    ${lgnd}
    <span style="margin-left:auto;font-size:10px;color:#aeaaa4;font-family:system-ui">日付クリックで追加・投稿クリックで編集</span>
  </div>
</div>`;
}

/* ═══════════════════════════════════════════
   RENDER: LIST VIEW
═══════════════════════════════════════════ */
function rList(){
  const pfx=`${S.y}-${pad(S.m+1)}`;
  const all=S.posts
    .filter(p=>p.date.startsWith(pfx))
    .filter(p=>S.lsf==='all'||p.status===S.lsf)
    .filter(p=>S.laf==='all'||p.accountId===S.laf)
    .sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):(a.time||'').localeCompare(b.time||''));
  const grouped=new Map();
  all.forEach(p=>{if(!grouped.has(p.date))grouped.set(p.date,[]);grouped.get(p.date).push(p);});

  const sfBtns=[{id:'all',lbl:'すべて'},...Object.entries(SC).map(([k,v])=>({id:k,lbl:v.ja}))].map(f=>
    `<button class="sf-btn" data-sf="${f.id}" style="padding:4px 9px;border-radius:6px;border:1px solid ${S.lsf===f.id?'#3d6b9e':'#e6e2db'};background:${S.lsf===f.id?'#ebf2f9':'#fff'};color:${S.lsf===f.id?'#3d6b9e':'#6e6a65'};font-size:11px;font-weight:${S.lsf===f.id?700:400};font-family:system-ui">${f.lbl}</button>`
  ).join('');

  const acctOpts=`<option value="all">すべてのアカウント</option>${ACCTS.map(a=>`<option value="${a.id}"${S.laf===a.id?' selected':''}>${esc(a.lbl)}</option>`).join('')}`;

  let rows='',gi=0;
  if(!all.length){
    rows=`<div style="text-align:center;padding:64px 0"><div style="font-size:36px;margin-bottom:12px">📭</div><p style="color:#6e6a65;font-family:system-ui">投稿がありません</p></div>`;
  }else{
    grouped.forEach((posts,date)=>{
      const d=date.split('-'),dw=WD[new Date(date).getDay()],isT=date===TKEY;
      rows+=`<div style="margin-bottom:26px">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
  <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:${isT?'#3d6b9e':'#f0ede8'};color:${isT?'#fff':'#6e6a65'};font-size:11px;font-weight:700;font-family:system-ui">
    📅 ${MJA[parseInt(d[1])-1]}${parseInt(d[2])}日（${dw}）${isT?'<span style="font-size:9px;background:rgba(255,255,255,.25);padding:1px 6px;border-radius:9px;margin-left:4px">今日</span>':''}
  </div>
  <div style="flex:1;height:1px;background:#e6e2db"></div>
  <span style="font-size:10px;color:#aeaaa4;font-family:system-ui">${posts.length}件</span>
</div>`;
      posts.forEach(p=>{
        gi++;
        const s=SC[p.status],a=acct(p.accountId);
        const pmj=JSON.stringify(toPostMesh(p),null,2);
        rows+=`
<div class="list-row" style="background:#fff;border:1px solid #e6e2db;border-left:3px solid ${s.dt};border-radius:0 10px 10px 0;padding:12px 16px;display:flex;gap:14px;align-items:flex-start;margin-bottom:6px">
  <div style="flex-shrink:0;width:64px;padding-top:1px">
    <div style="font-size:10px;color:#aeaaa4;font-family:system-ui;margin-bottom:2px">#${String(gi).padStart(2,'0')}</div>
    <div style="font-size:11px;color:#6e6a65;font-family:system-ui">🕐 ${p.time||'—'}</div>
  </div>
  <div style="flex:1;min-width:0">
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px">${aBadge(p.accountId)} ${sBadge(p.status,true)}</div>
    <p style="margin:0 0 6px;font-size:13px;color:#252320;font-family:system-ui;line-height:1.75;word-break:break-all">${esc(p.text)}</p>
    ${p.media?`<div style="font-size:11px;color:#6e6a65;font-family:system-ui">🖼 ${esc(p.media)}</div>`:''}
  </div>
  <div style="flex-shrink:0;display:flex;flex-direction:column;gap:5px;align-items:flex-end">
    <button class="copy-btn" data-copy-text="${esc(p.text)}" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;border:1px solid #e6e2db;background:#fff;color:#6e6a65;font-size:10px;font-weight:600;font-family:system-ui">📋 テキストをコピー</button>
    <button class="copy-btn" data-copy-json="${esc(pmj)}" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;border:1px solid #3d6b9e;background:#ebf2f9;color:#3d6b9e;font-size:10px;font-weight:600;font-family:system-ui">📋 PostMesh JSON</button>
    <div style="display:flex;gap:4px;margin-top:2px">
      <button class="btn-edit" data-pid="${p.id}" style="padding:4px 10px;border:1px solid #e6e2db;border-radius:6px;background:#fff;color:#6e6a65;font-size:10px;font-weight:600;font-family:system-ui">✏ 編集</button>
      <button class="btn-del" data-pid="${p.id}" style="padding:4px 7px;border:1px solid #e6e2db;border-radius:6px;background:#fff;color:#c8c3bc;font-size:12px">🗑</button>
    </div>
  </div>
</div>`;
      });
      rows+='</div>';
    });
  }

  return`
<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <div style="background:#fff;border-bottom:1px solid #e6e2db;padding:10px 20px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap">
    <span style="font-size:12px;color:#aeaaa4">🔍</span>
    ${sfBtns}
    <div style="width:1px;height:16px;background:#e6e2db"></div>
    <select id="acct-filter" style="padding:4px 8px;border:1px solid #e6e2db;border-radius:6px;font-size:11px;color:#6e6a65;background:#fff;font-family:system-ui">${acctOpts}</select>
    <div style="margin-left:auto;display:flex;gap:7px;align-items:center">
      <span style="font-size:11px;color:#6e6a65;font-family:system-ui"><strong style="color:#3d6b9e">${all.length}</strong> 件</span>
      <button id="list-export" style="display:flex;align-items:center;gap:5px;padding:6px 13px;border:1px solid #fcd34d;border-radius:7px;background:#fffbeb;color:#92400e;font-size:11px;font-weight:700;font-family:system-ui">⚡ PostMesh エクスポート</button>
      <button id="list-new" style="display:flex;align-items:center;gap:5px;padding:6px 13px;border:none;border-radius:7px;background:#3d6b9e;color:#fff;font-size:11px;font-weight:700;font-family:system-ui">＋ 新規投稿</button>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:18px 20px">${rows}</div>
  <div style="border-top:1px solid #e6e2db;background:#fff;padding:8px 20px;flex-shrink:0">
    <span style="font-size:10px;color:#aeaaa4;font-family:system-ui">⬇ 「PostMesh エクスポート」で今月の投稿を API 形式 JSON に変換・コピーできます</span>
  </div>
</div>`;
}

  ${existing.map(p=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="width:6px;height:6px;border-radius:50%;background:${SC[p.status]?.dt};flex-shrink:0;display:inline-block"></span><span style="font-size:10px;color:#6e6a65;font-family:system-ui;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.time} ${acct(p.accountId)?.lbl||''} — ${esc(p.text.slice(0,22))}…</span></div>`).join('')}

        <h2 style="margin:0;font-size:17px;font-weight:700;color:#252320;font-family:Georgia;letter-spacing:-.4px">${day?`${S.y}年${MJA[S.m]}${day}日`:'新規投稿'}</h2>

/* ═══════════════════════════════════════════
   RENDER: EXPORT MODAL

function rExport(){
  const pfx=`${S.y}-${pad(S.m+1)}`;
  const mp=S.posts.filter(p=>p.date.startsWith(pfx)).sort((a,b)=>a.date.localeCompare(b.date));
  const filtered=S.exportMode==='scheduled'?mp.filter(p=>p.status==='Scheduled')
    :S.exportMode==='month'?mp
    :mp.filter(p=>S.exportSel.has(p.id));
  const arr=filtered.map(toPostMesh);
  const json=JSON.stringify(arr.length===1?arr[0]:arr,null,2);

  const mBtns=[
    {id:'month',lbl:'今月すべて',cnt:mp.length},
    {id:'scheduled',lbl:'Scheduled のみ',cnt:mp.filter(p=>p.status==='Scheduled').length},
    {id:'select',lbl:'個別に選択',cnt:S.exportSel.size},
  ].map(m=>`<button class="ex-mode" data-mode="${m.id}" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 10px;margin-bottom:4px;border-radius:7px;border:1px solid ${S.exportMode===m.id?'#3d6b9e':'transparent'};background:${S.exportMode===m.id?'#ebf2f9':'transparent'};color:${S.exportMode===m.id?'#3d6b9e':'#6e6a65'};font-size:12px;font-weight:${S.exportMode===m.id?700:400};font-family:system-ui;text-align:left">
  <span>${m.lbl}</span>
  <span style="font-size:10px;background:${S.exportMode===m.id?'#3d6b9e':'#e6e2db'};color:${S.exportMode===m.id?'#fff':'#6e6a65'};padding:1px 6px;border-radius:9px;font-weight:700">${m.cnt}</span>
</button>`).join('');

  const plH=mp.map(p=>{
    const a=acct(p.accountId),s=SC[p.status];
    const chk=S.exportSel.has(p.id),dis=S.exportMode!=='select';
    return`<label class="ex-chk" data-pid="${p.id}" style="display:flex;align-items:flex-start;gap:8px;padding:7px 6px;border-radius:7px;cursor:${dis?'default':'pointer'};opacity:${dis?.6:1}">
  <div style="margin-top:2px;width:15px;height:15px;border-radius:4px;border:1.5px solid ${!dis&&chk?'#3d6b9e':'#c8c3bb'};background:${!dis&&chk?'#3d6b9e':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
    ${!dis&&chk?'<span style="color:#fff;font-size:9px;line-height:1">✓</span>':''}
  </div>
  <div style="flex:1;min-width:0">
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">
      <span style="font-size:10px;font-weight:700;color:${a?.col};font-family:system-ui">${PI[a?.pl]||'•'}</span>
      <span style="font-size:9px;color:#6e6a65;font-family:system-ui;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a?.lbl||'')}</span>
      <span style="font-size:9px;color:${s?.tx};font-family:system-ui;font-weight:600">${s?.ja||''}</span>
    </div>
    <p style="margin:0;font-size:10px;color:#252320;font-family:system-ui;line-height:1.4;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(p.text)}</p>
    <span style="font-size:9px;color:#aeaaa4;font-family:system-ui">${p.date.split('-').slice(1).map(Number).join('/')} ${p.time||''}</span>
  </div>
</label>`;
  }).join('');

  return`
<div id="ex-overlay" style="position:fixed;inset:0;background:rgba(20,18,16,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px">
  <div class="modal-in" style="background:#fff;border-radius:16px;width:100%;max-width:720px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.18)">
    <div style="padding:20px 24px 16px;border-bottom:1px solid #e6e2db;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;background:#fef3c7;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px">⚡</div>
        <div>
          <h2 style="margin:0;font-size:16px;font-weight:700;color:#252320;font-family:Georgia">PostMesh 用にエクスポート</h2>
          <p style="margin:0;font-size:11px;color:#6e6a65;font-family:system-ui">API 仕様に準拠した JSON をコピーできます</p>
        </div>
      </div>
      <button id="ex-close" style="background:#f2eeea;border:none;border-radius:8px;padding:6px 10px;color:#6e6a65;font-size:14px">✕</button>
    </div>
    <div style="display:flex;flex:1;overflow:hidden">
      <div style="width:280px;border-right:1px solid #e6e2db;display:flex;flex-direction:column;flex-shrink:0">
        <div style="padding:12px 16px 8px;border-bottom:1px solid #e6e2db;flex-shrink:0">
          <p style="margin:0 0 8px;font-size:10px;font-weight:700;color:#aeaaa4;font-family:system-ui;text-transform:uppercase;letter-spacing:.08em">エクスポートする投稿</p>
          ${mBtns}
        </div>
        <div style="flex:1;overflow-y:auto;padding:8px 12px">${plH}</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div style="padding:12px 16px 8px;border-bottom:1px solid #e6e2db;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
          <div>
            <p style="margin:0;font-size:10px;font-weight:700;color:#aeaaa4;font-family:system-ui;text-transform:uppercase;letter-spacing:.08em">生成された JSON</p>
            <p style="margin:0;font-size:11px;color:#6e6a65;font-family:system-ui">${filtered.length} 件の投稿</p>
          </div>
          <button id="ex-copy" style="display:flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:8px;background:#3d6b9e;color:#fff;font-size:12px;font-weight:700;font-family:system-ui">📋 JSON をコピー</button>
        </div>
        <div style="flex:1;overflow-y:auto;padding:16px">
          <pre style="margin:0;font-size:11px;color:#1e293b;background:#f8fafc;border:1px solid #e6e2db;border-radius:10px;padding:14px 16px;line-height:1.7;white-space:pre;overflow-x:auto">${esc(json)}</pre>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

  document.getElementById('app').innerHTML=`
    ${rHeader()}
    <div style="flex:1;display:flex;overflow:hidden">
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        ${S.view==='calendar'?rCalendar():rList()}
      </div>
      ${S.view==='calendar'?`<div class="panel-wrap" style="width:${pw};min-width:${pw}">${S.panelOpen?rPanel():''}</div>`:''}
    </div>
    ${S.exportOpen?rExport():''}
  `;
  bind();
}

/* ═══════════════════════════════════════════
   PANEL OPEN / CLOSE
═══════════════════════════════════════════ */
function openPanel(day,editId=null){
  S.selectedDay=day;S.editId=editId;S.panelOpen=true;S.view='calendar';
  const ep=S.posts.find(p=>p.id===editId);
  const def=day?dkey(S.y,S.m,day):TKEY;
  F.aid=ep?.accountId||'x_main';
  F.date=ep?.date||def;
  F.time=ep?.time||'19:00';
  F.text=ep?.text||'';
  F.media=ep?.media||'';
  F.status=ep?.status||'Draft';
  render();
  setTimeout(()=>document.getElementById('f-text')?.focus(),80);
}
function closePanel(){S.panelOpen=false;S.selectedDay=null;S.editId=null;render();}

function savePost(){
  const text=(document.getElementById('f-text')?.value||'').trim();
  const date=document.getElementById('f-date')?.value||F.date;
  const time=document.getElementById('f-time')?.value||F.time;
  const media=(document.getElementById('f-media')?.value||'').trim();
  const errT=document.getElementById('err-text');
  if(!text){if(errT)errT.style.display='block';return;}
  if(errT)errT.style.display='none';
  const post={id:S.editId||uid(),accountId:F.aid,date,time,text,media,status:F.status};
  if(S.posts.find(p=>p.id===post.id)){S.posts=S.posts.map(p=>p.id===post.id?post:p);}
  else S.posts=[...S.posts,post];
  saveP();closePanel();
}
function delPost(id){
  if(!confirm('この投稿を削除しますか？'))return;
  S.posts=S.posts.filter(p=>p.id!==id);saveP();closePanel();
}

/* PostMesh プレビューをリアルタイム更新 */
function updatePm(){
  const el=document.getElementById('pm-pre');if(!el)return;
  const text=document.getElementById('f-text')?.value||'';
  const date=document.getElementById('f-date')?.value||F.date;
  const time=document.getElementById('f-time')?.value||F.time;
  el.textContent=JSON.stringify(toPostMesh({...F,text,date,time}),null,2);
}

/* ═══════════════════════════════════════════
   EVENT BINDING
═══════════════════════════════════════════ */
function bind(){
  /* ヘッダー */
  document.getElementById('btn-prev')?.addEventListener('click',()=>{S.m===0?(S.m=11,S.y--):S.m--;closePanel();});
  document.getElementById('btn-next')?.addEventListener('click',()=>{S.m===11?(S.m=0,S.y++):S.m++;closePanel();});
  document.getElementById('vt-cal')?.addEventListener('click',()=>{S.view='calendar';render();});
  document.getElementById('vt-list')?.addEventListener('click',()=>{S.view='list';closePanel();});

  const openExport=()=>{
    S.exportOpen=true;S.exportMode='month';
    S.exportSel=new Set(S.posts.filter(p=>p.date.startsWith(`${S.y}-${pad(S.m+1)}`)).map(p=>p.id));
    render();
  };
  document.getElementById('btn-export')?.addEventListener('click',openExport);
  document.getElementById('btn-new')?.addEventListener('click',()=>openPanel(TODAY.getDate()));

  /* カレンダー */
  document.querySelectorAll('.day-cell:not(.empty-cell)').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('.post-chip'))return;
      openPanel(parseInt(el.dataset.day));
    });
  });
  document.querySelectorAll('.post-chip').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const p=S.posts.find(x=>x.id===el.dataset.pid);
      if(!p)return;
      openPanel(parseInt(p.date.split('-')[2]),p.id);
    });
  });

  /* リスト */
  document.querySelectorAll('.sf-btn').forEach(b=>b.addEventListener('click',()=>{S.lsf=b.dataset.sf;render();}));
  document.getElementById('acct-filter')?.addEventListener('change',e=>{S.laf=e.target.value;render();});
  document.getElementById('list-export')?.addEventListener('click',openExport);
  document.getElementById('list-new')?.addEventListener('click',()=>{S.view='calendar';openPanel(TODAY.getDate());});
  document.querySelectorAll('.btn-edit').forEach(b=>b.addEventListener('click',()=>{
    const p=S.posts.find(x=>x.id===b.dataset.pid);if(!p)return;
    S.view='calendar';openPanel(parseInt(p.date.split('-')[2]),p.id);
  }));
  document.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',()=>delPost(b.dataset.pid)));

  /* コピーボタン（テキスト/JSON） */
  document.querySelectorAll('[data-copy-text]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();copyText(b.dataset.copyText,b);}));
  document.querySelectorAll('[data-copy-json]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();copyText(b.dataset.copyJson,b);}));

  /* パネル */
  document.getElementById('p-close')?.addEventListener('click',closePanel);
  document.getElementById('p-cancel')?.addEventListener('click',closePanel);
  document.getElementById('p-save')?.addEventListener('click',savePost);
  document.getElementById('p-del')?.addEventListener('click',()=>delPost(S.editId));

  /* アカウント選択（DOMのみ更新） */
  document.querySelectorAll('.acct-radio').forEach(el=>{
    el.addEventListener('click',()=>{
      F.aid=el.dataset.aid;
      document.querySelectorAll('.acct-radio').forEach(r=>{
        const on=r.dataset.aid===F.aid;
        r.style.border=`1.5px solid ${on?'#3d6b9e':'#e6e2db'}`;
        r.style.background=on?'#ebf2f9':'#fff';
        const c=r.querySelector('div');
        if(c){c.style.border=`2px solid ${on?'#3d6b9e':'#c8c3bb'}`;c.style.background=on?'#3d6b9e':'#fff';c.innerHTML=on?'<div style="width:6px;height:6px;border-radius:50%;background:#fff"></div>':'';}
        const sp=r.querySelector('span');if(sp)sp.style.fontWeight=on?'600':'400';
      });
      updatePm();
    });
  });

  /* ステータスボタン（DOMのみ更新） */
  document.querySelectorAll('.st-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      F.status=b.dataset.st;
      document.querySelectorAll('.st-btn').forEach(x=>{
        const k=x.dataset.st,s=SC[k],on=k===F.status;
        x.style.border=`1.5px solid ${on?s.bo:'#e6e2db'}`;x.style.background=on?s.bg:'#fff';x.style.color=on?s.tx:'#6e6a65';x.style.fontWeight=on?'700':'400';
        const d=x.querySelector('div');if(d)d.style.background=on?s.dt:'#c8c3bb';
      });
    });
  });

  /* フォーム入力 */
  document.getElementById('f-text')?.addEventListener('input',e=>{
    F.text=e.target.value;
    const c=document.getElementById('char-cnt');if(c)c.textContent=e.target.value.length+' 文字';
    updatePm();
  });
  document.getElementById('f-date')?.addEventListener('change',e=>{F.date=e.target.value;updatePm();});
  document.getElementById('f-time')?.addEventListener('change',e=>{F.time=e.target.value;updatePm();});
  document.getElementById('f-media')?.addEventListener('change',e=>{F.media=e.target.value;});

  /* パネル内 PostMesh コピー */
  document.getElementById('pm-copy')?.addEventListener('click',e=>{
    const text=document.getElementById('f-text')?.value||'';
    const date=document.getElementById('f-date')?.value||F.date;
    const time=document.getElementById('f-time')?.value||F.time;
    copyText(JSON.stringify(toPostMesh({...F,text,date,time}),null,2),e.currentTarget);
  });

  /* エクスポートモーダル */
  document.getElementById('ex-close')?.addEventListener('click',()=>{S.exportOpen=false;render();});
  document.getElementById('ex-overlay')?.addEventListener('click',e=>{if(e.target.id==='ex-overlay'){S.exportOpen=false;render();}});
  document.getElementById('ex-copy')?.addEventListener('click',e=>{
    const pfx=`${S.y}-${pad(S.m+1)}`;
    const mp=S.posts.filter(p=>p.date.startsWith(pfx)).sort((a,b)=>a.date.localeCompare(b.date));
    const fl=S.exportMode==='scheduled'?mp.filter(p=>p.status==='Scheduled'):S.exportMode==='month'?mp:mp.filter(p=>S.exportSel.has(p.id));
    const arr=fl.map(toPostMesh);
    copyText(JSON.stringify(arr.length===1?arr[0]:arr,null,2),e.currentTarget);
  });
  document.querySelectorAll('.ex-mode').forEach(b=>{
    b.addEventListener('click',()=>{
      S.exportMode=b.dataset.mode;
      if(S.exportMode==='month')S.exportSel=new Set(S.posts.filter(p=>p.date.startsWith(`${S.y}-${pad(S.m+1)}`)).map(p=>p.id));
      render();
    });
  });
  document.querySelectorAll('.ex-chk').forEach(el=>{
    el.addEventListener('click',()=>{
      if(S.exportMode!=='select')return;
      const id=el.dataset.pid;
      S.exportSel.has(id)?S.exportSel.delete(id):S.exportSel.add(id);
      render();
    });
  });
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
render();
</script>
</body>
</html>
